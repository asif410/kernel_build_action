name: Build Poco F1 Docker Kernel
on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Builder
      uses: actions/checkout@v4

    # --- CACHING BLOCK (Speeds up toolchain downloads after 1st run) ---
    - name: Cache Toolchains
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/clang
          ${{ github.workspace }}/gcc-64
          ${{ github.workspace }}/gcc-32
        key: ${{ runner.os }}-toolchains-${{ hashFiles('**/main.yml') }}
        restore-keys: |
          ${{ runner.os }}-toolchains-

    - name: Build Kernel
      uses: dabao1955/kernel_build_action@main
      with:
          kernel-url: https://github.com/asif410/android_kernel_xiaomi_sdm845
          kernel-dir: kernel
          kernel-branch: 16.0-bpf
          config: vendor/xiaomi/mi845_defconfig
          arch: arm64

          # THE TRUE NUCLEAR OPTION: 
          # 1. Strips -Werror from all files
          # 2. Forces -w flag to suppress ALL warnings so they can't become errors
          extra-cmd: |
            find . -type f -name "Makefile*" -exec sed -i 's/-Werror//g' {} +
            find . -type f -name "Kbuild*" -exec sed -i 's/-Werror//g' {} +
            export KCFLAGS="-w -Wno-error -Wno-incompatible-function-pointer-types -Wno-declaration-after-statement"
          
          aosp-gcc: true
          aosp-clang: true
          android-version: 12
          aosp-clang-version: r383902
          
          disable-lto: false
          anykernel3: true
          ksu: true
          ksu-version: main

    - name: Upload Kernel Result
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-PocoF1-Docker
        path: kernel/out/*.zip
